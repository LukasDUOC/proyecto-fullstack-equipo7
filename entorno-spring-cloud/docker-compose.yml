services:

  # ─── CONTENEDOR 1: Base de datos MySQL ─────────────────────────────
  db-servicio:
    image: mysql:8.0
    container_name: mysql_cloud
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: springcloud_db
    ports:
      - "3306:3306"
    networks:
      - red_spring_cloud
    volumes:
      - persistencia_db:/var/lib/mysql

  # ─── CONTENEDOR 2: Workspace Maven con JDK 21 ──────────────────────
  workspace-java:
    image: maven:3.9-eclipse-temurin-21
    container_name: entorno_spring_cloud
    ports:
      - "8761:8761"   # Eureka Server
      - "8080:8080"   # API Gateway
  
    depends_on:
      - db-servicio
    networks:
      - red_spring_cloud
    command: tail -f /dev/null   # Mantiene el contenedor encendido en espera
    volumes:
      - ./codigo-fuente:/app
    working_dir: /app

networks:
  red_spring_cloud:

volumes:
  persistencia_db: